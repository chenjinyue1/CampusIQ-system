collection_name: agent
persist_directory: data/chroma_db
k: 3
data_path: data
md5_hex_store: data/md5_hex_store/md5.txt
allow_knowledge_file_types: ["pdf", "txt", "docx", "md", "pptx"]

chunk_size: 200      # 默认分块大小
chunk_overlap: 20   # 默认分块重叠
separators: ["\n\n", "\n", ".", "!", "?", "。", "！", "？", " ", ""]
